name: Auto Update MAS Traditional Chinese
# Version: 1.0.1 - Triggering re-scan

on:
  push: # 每次推送代碼時執行
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *' # 每天凌晨執行一次
  workflow_dispatch: # 支援手動觸發

permissions:
  contents: write # 允許推送 Hash 紀錄以及建立 Release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Translation Script
        run: python translate.py

      - name: Check if MAS_AIO_TW.cmd was generated
        id: check_file
        run: |
          if [ -f "MAS_AIO_TW.cmd" ]; then
            echo "updated=true" >> $GITHUB_OUTPUT
          else
            echo "updated=false" >> $GITHUB_OUTPUT
          fi

      - name: Get current date
        if: steps.check_file.outputs.updated == 'true'
        id: date
        run: echo "date=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.check_file.outputs.updated == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.date.outputs.date }}" \
            --title "MAS AIO 台灣繁體中文版 v${{ steps.date.outputs.date }}" \
            --notes "自動翻譯自 massgravel/Microsoft-Activation-Scripts 原始碼。翻譯工具：deep_translator (Google)。" \
            MAS_AIO_TW.cmd

      - name: Commit and Push Updates
        if: steps.check_file.outputs.updated == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add hash.txt translation_cache.csv
          git commit -m "chore: update hash and translation cache [skip ci]"
          git push
