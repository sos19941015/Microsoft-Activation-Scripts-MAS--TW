name: Auto Update MAS Traditional Chinese

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 2 * * *'   # 每天台灣時間上午 10:00 (UTC+8) 執行
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force a GitHub Release even if upstream content hash did not change'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: mas-auto-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Translation Script
        id: translate
        run: python translate.py

      - name: Decide Release Mode
        id: release_gate
        run: |
          if [ "${{ steps.translate.outputs.updated }}" = "true" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.force_release || 'false' }}" = "true" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Get release date tag
        if: steps.release_gate.outputs.should_release == 'true'
        id: date
        run: |
          echo "tag=v$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT
          echo "title=MAS 繁體中文翻譯版 $(date +'%Y/%m/%d')" >> $GITHUB_OUTPUT

      - name: Delete existing release if same tag exists
        if: steps.release_gate.outputs.should_release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.date.outputs.tag }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "刪除已存在的 Release：$TAG"
            gh release delete "$TAG" --yes --cleanup-tag
          fi

      - name: Generate Release Notes
        if: steps.release_gate.outputs.should_release == 'true'
        run: python generate_release_notes.py

      - name: Create GitHub Release
        if: steps.release_gate.outputs.should_release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.date.outputs.tag }}" \
            --title "${{ steps.date.outputs.title }}" \
            -F release_notes.md \
            MAS_AIO_TW.cmd MAS_AIO_TW.ps1 MAS_AIO_TW_File.ps1

      - name: Commit Updated Cache and Hash
        if: steps.translate.outputs.updated == 'true'
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add hash.txt translation_cache.csv translate.log
          git diff --staged --quiet || git commit -m "chore: update hash and translation cache [skip ci]"
          git push
