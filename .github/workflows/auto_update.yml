name: Auto Update MAS Traditional Chinese

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 2 * * *'   # 每天台灣時間上午 10:00 (UTC+8) 執行
  workflow_dispatch:        # 支援手動觸發

# 防止同時有多個 workflow 在跑
concurrency:
  group: mas-auto-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. 取得程式碼（含 hash.txt 與 translation_cache.csv）──
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. 建立 Python 環境（加快 cache 避免重複安裝）──
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 3. 執行翻譯腳本，結果會寫入 GITHUB_OUTPUT ──
      - name: Run Translation Script
        id: translate
        run: python translate.py

      # ── 4. 有更新才繼續後續步驟 ──
      - name: Get release date tag
        if: steps.translate.outputs.updated == 'true'
        id: date
        run: |
          echo "tag=v$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT
          echo "title=MAS 繁體中文翻譯版 $(date +'%Y/%m/%d')" >> $GITHUB_OUTPUT

      # ── 5. 刪除當天已存在的 Release（避免版本號衝突）──
      - name: Delete existing release if same tag exists
        if: steps.translate.outputs.updated == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.date.outputs.tag }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "刪除已存在的 Release：$TAG"
            gh release delete "$TAG" --yes --cleanup-tag
          fi

      # ── 6. 建立新 Release 並上傳兩個翻譯檔 ──
      - name: Create GitHub Release
        if: steps.translate.outputs.updated == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.date.outputs.tag }}" \
            --title "${{ steps.date.outputs.title }}" \
            --notes "## 🤖 自動翻譯版本

          本 Release 由 GitHub Actions 自動生成。

          ### 📦 包含檔案
          | 檔案 | 說明 |
          |------|------|
          | \`MAS_AIO_TW.cmd\` | 批次檔版本，雙擊執行 |
          | \`MAS_AIO_TW.ps1\` | PowerShell 載入器 |

          ### 🚀 一鍵執行（PowerShell 系統管理員）
          \`\`\`powershell
          irm https://raw.githubusercontent.com/sos19941015/Microsoft-Activation-Scripts-MAS--TW/main/MAS_AIO_TW.ps1 | iex
          \`\`\`

          ### ⚠️ 免責聲明
          翻譯內容由自動化腳本生成，不保證 100% 準確。如有問題請使用官方原版：\`irm https://get.activated.win | iex\`

          ---
          *原始專案：[massgravel/Microsoft-Activation-Scripts](https://github.com/massgravel/Microsoft-Activation-Scripts)*" \
            MAS_AIO_TW.cmd MAS_AIO_TW.ps1

      # ── 7. 將更新後的 hash.txt 與快取推回儲存庫 ──
      - name: Commit Updated Cache and Hash
        if: steps.translate.outputs.updated == 'true'
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add hash.txt translation_cache.csv translate.log
          git diff --staged --quiet || git commit -m "chore: update hash and translation cache [skip ci]"
          git push
